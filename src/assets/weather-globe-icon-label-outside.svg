<svg width="150" height="150" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6FC6EE"/>
      <stop offset="100%" stop-color="#1A6FA8"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="150" cy="130" r="105"/>
    </clipPath>
  </defs>

  <circle cx="150" cy="130" r="105" fill="url(#globeGrad)"/>

  <g clip-path="url(#circleClip)">
    <!-- Sun top right -->
    <circle cx="195" cy="75" r="24" fill="#FFD66B"/>
    <g stroke="#FFD66B" stroke-width="4" stroke-linecap="round">
      <line x1="195" y1="40" x2="195" y2="31"/>
      <line x1="226" y1="49" x2="233" y2="42"/>
      <line x1="226" y1="101" x2="233" y2="108"/>
    </g>

    <!-- Cloud left, larger and lower -->
    <ellipse cx="105" cy="125" rx="48" ry="27" fill="#FFFFFF"/>
    <ellipse cx="73" cy="133" rx="30" ry="20" fill="#FFFFFF"/>
    <ellipse cx="140" cy="136" rx="32" ry="20" fill="#FFFFFF"/>

    <!-- Rain drops below cloud -->
    <g fill="#0E5E8F">
      <path d="M85 178 q7 14 0 21 q-7 -7 0 -21 Z"/>
      <path d="M115 184 q7 14 0 21 q-7 -7 0 -21 Z"/>
      <path d="M145 176 q7 14 0 21 q-7 -7 0 -21 Z"/>
    </g>
  </g>

  <circle cx="150" cy="130" r="105" fill="none" stroke="#0E5E8F" stroke-width="3"/>

  <text x="150" y="270" text-anchor="middle" font-size="28" font-weight="700"
    fill="#1A6FA8" font-family="Arial, Helvetica, sans-serif" letter-spacing="1">WEATHER</text>
</svg>
